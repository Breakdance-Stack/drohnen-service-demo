<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#060a12" stroke="url(#g1)" stroke-width="2"/>
  <!-- Drone body -->
  <ellipse cx="60" cy="60" rx="10" ry="6" fill="url(#g1)" opacity="0.9"/>
  <!-- Arms -->
  <line x1="52" y1="56" x2="30" y2="38" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="68" y1="56" x2="90" y2="38" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="64" x2="30" y2="82" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="68" y1="64" x2="90" y2="82" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
  <!-- Rotors -->
  <ellipse cx="30" cy="38" rx="14" ry="4" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.6" transform="rotate(-10 30 38)"/>
  <ellipse cx="90" cy="38" rx="14" ry="4" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.6" transform="rotate(10 90 38)"/>
  <ellipse cx="30" cy="82" rx="14" ry="4" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.6" transform="rotate(10 30 82)"/>
  <ellipse cx="90" cy="82" rx="14" ry="4" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.6" transform="rotate(-10 90 82)"/>
  <!-- Motor dots -->
  <circle cx="30" cy="38" r="4" fill="#00d4ff"/>
  <circle cx="90" cy="38" r="4" fill="#00d4ff"/>
  <circle cx="30" cy="82" r="4" fill="#00d4ff"/>
  <circle cx="90" cy="82" r="4" fill="#00d4ff"/>
  <!-- Camera lens -->
  <circle cx="60" cy="63" r="3" fill="#060a12" stroke="#00d4ff" stroke-width="1"/>
  <circle cx="60" cy="63" r="1.5" fill="#00d4ff" opacity="0.8"/>
</svg>
